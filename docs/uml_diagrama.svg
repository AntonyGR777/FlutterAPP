<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#000"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #000; }
      .title { font-size: 24px; font-weight: bold; }
      .box-title { font-size: 15px; font-weight: bold; }
      .item { font-size: 12px; }
      .box { fill: #fff; stroke: #000; stroke-width: 1.5; }
      .line { stroke: #000; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="700" fill="#fff"/>
  <text x="500" y="35" text-anchor="middle" class="title">Diagrama UML</text>

  <!-- Fila principal -->
  <rect x="40" y="70" width="160" height="90" class="box"/>
  <text x="120" y="95" text-anchor="middle" class="box-title">MiApp</text>
  <text x="55" y="120" class="item">+ tema gris</text>
  <text x="55" y="140" class="item">+ login</text>

  <rect x="260" y="70" width="180" height="110" class="box"/>
  <text x="350" y="95" text-anchor="middle" class="box-title">Inicio</text>
  <text x="275" y="120" class="item">+ controles</text>
  <text x="275" y="140" class="item">+ navegacion</text>
  <text x="275" y="160" class="item">+ widget personalizado</text>

  <rect x="520" y="70" width="190" height="120" class="box"/>
  <text x="615" y="95" text-anchor="middle" class="box-title">GestionPosts</text>
  <text x="535" y="120" class="item">+ lista de meks</text>
  <text x="535" y="140" class="item">+ agregar / editar</text>
  <text x="535" y="160" class="item">+ eliminar / fotos</text>
  <text x="535" y="180" class="item">+ API + SQLite</text>

  <rect x="780" y="70" width="160" height="110" class="box"/>
  <text x="860" y="95" text-anchor="middle" class="box-title">Mek</text>
  <text x="795" y="120" class="item">+ id</text>
  <text x="795" y="140" class="item">+ nombre</text>
  <text x="795" y="160" class="item">+ apodo / foto</text>

  <!-- Datos y servicios -->
  <rect x="40" y="260" width="180" height="110" class="box"/>
  <text x="130" y="285" text-anchor="middle" class="box-title">ApiService</text>
  <text x="55" y="310" class="item">+ GET</text>
  <text x="55" y="330" class="item">+ POST</text>
  <text x="55" y="350" class="item">+ PUT / DELETE</text>

  <rect x="280" y="260" width="180" height="110" class="box"/>
  <text x="370" y="285" text-anchor="middle" class="box-title">MekDatabase</text>
  <text x="295" y="310" class="item">+ agregarMek</text>
  <text x="295" y="330" class="item">+ actualizarMek</text>
  <text x="295" y="350" class="item">+ listar/eliminar</text>

  <rect x="520" y="260" width="160" height="90" class="box"/>
  <text x="600" y="285" text-anchor="middle" class="box-title">SQLite</text>
  <text x="535" y="310" class="item">+ tabla meks</text>
  <text x="535" y="330" class="item">+ tabla usuarios</text>

  <rect x="760" y="260" width="180" height="110" class="box"/>
  <text x="850" y="285" text-anchor="middle" class="box-title">NotificationService</text>
  <text x="775" y="310" class="item">+ notificacion Android</text>
  <text x="775" y="330" class="item">+ dialogo respaldo</text>

  <!-- Otras pantallas -->
  <rect x="90" y="500" width="190" height="100" class="box"/>
  <text x="185" y="525" text-anchor="middle" class="box-title">LecturaArchivo</text>
  <text x="105" y="550" class="item">+ lee datos.txt</text>
  <text x="105" y="570" class="item">+ escribe nota.txt</text>

  <rect x="405" y="500" width="200" height="110" class="box"/>
  <text x="505" y="525" text-anchor="middle" class="box-title">TareasAsincronas</text>
  <text x="420" y="550" class="item">+ FutureBuilder</text>
  <text x="420" y="570" class="item">+ async/await</text>
  <text x="420" y="590" class="item">+ Isolate / Timer</text>

  <rect x="730" y="500" width="180" height="90" class="box"/>
  <text x="820" y="525" text-anchor="middle" class="box-title">Archivo/Fotos</text>
  <text x="745" y="550" class="item">+ nota.txt</text>
  <text x="745" y="570" class="item">+ fotos de meks</text>

  <!-- Flechas -->
  <path d="M200 115 L260 115" class="line"/>
  <path d="M440 125 L520 125" class="line"/>
  <path d="M710 125 L780 125" class="line"/>

  <path d="M575 190 L185 260" class="line"/>
  <path d="M615 190 L370 260" class="line"/>
  <path d="M460 315 L520 315" class="line"/>
  <path d="M670 190 L850 260" class="line"/>

  <path d="M330 180 L185 500" class="line"/>
  <path d="M360 180 L505 500" class="line"/>
  <path d="M615 190 L820 500" class="line"/>
</svg>
